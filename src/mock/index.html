<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenExcel - Mock UI</title>
    <style>
      html {
        display: flex;
        justify-content: center;
        min-height: 100vh;
        background: #f0f0f0;
      }
      body {
        width: 380px;
        min-height: 100vh;
        border-left: 1px solid #d0d0d0;
        border-right: 1px solid #d0d0d0;
        background: #ffffff;
        position: relative;
      }
      .resize-handle {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 8px;
        cursor: col-resize;
        z-index: 10000;
      }
      .resize-handle:hover,
      .resize-handle.active {
        background: rgba(0, 120, 212, 0.35);
      }
      .resize-handle-left { left: -4px; }
      .resize-handle-right { right: -4px; }
      html.resizing { cursor: col-resize; }
      html.resizing * { cursor: col-resize !important; }
    </style>
  </head>
  <body>
    <div class="resize-handle resize-handle-left"></div>
    <div class="resize-handle resize-handle-right"></div>
    <div id="root">Loading mock UI...</div>
    <script type="module" src="./mockMain.tsx"></script>
    <script>
      (function() {
        const body = document.body;
        const html = document.documentElement;
        const minW = 280, maxW = 800;
        let dragging = null, startX = 0, startW = 0;

        for (const handle of document.querySelectorAll('.resize-handle')) {
          handle.addEventListener('mousedown', function(e) {
            e.preventDefault();
            dragging = this.classList.contains('resize-handle-left') ? 'left' : 'right';
            startX = e.clientX;
            startW = body.offsetWidth;
            this.classList.add('active');
            html.classList.add('resizing');
          });
        }

        document.addEventListener('mousemove', function(e) {
          if (!dragging) return;
          const dx = e.clientX - startX;
          const delta = dragging === 'right' ? dx * 2 : -dx * 2;
          body.style.width = Math.max(minW, Math.min(maxW, startW + delta)) + 'px';
        });

        document.addEventListener('mouseup', function() {
          if (!dragging) return;
          dragging = null;
          html.classList.remove('resizing');
          for (const h of document.querySelectorAll('.resize-handle')) h.classList.remove('active');
        });
      })();
    </script>
  </body>
</html>
